<main>

<h1>Mon voyage en Nouvelle-Zélande</h1>

<div id="map"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-41.3, 174.7], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const punaiseEmoji = L.divIcon({
    html: "📍",
    className: "emoji-marker",
    iconSize: [30, 30],
    iconAnchor: [15, 30]
});

const punaiseRouge = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',

    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34]
});

/* Auckland */
L.marker([-36.8485, 174.7633], {
    icon: punaiseEmoji
})
 .addTo(map)
 .bindPopup("<b>Auckland</b><br>Début du voyage");


</script>

</body>
</html>
